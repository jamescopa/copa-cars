<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Copa Cars Accesorios - La mejor tienda de accesorios para autos en Ecuador.">
    <title>Copa Cars Accesorios | Catálogo Premium</title>
    <link rel="icon" href="logo.jpg" type="image/x-icon">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    
    <style>
        :root { 
            --primary: #FF8C00; 
            --primary-hover: #E07B00;
            --dark: #111111; 
            --card-bg: #1a1a1a;
            --text-light: #ffffff;
            --text-gray: #aaaaaa; 
            --light-bg: #222222; 
            --shadow: 0 8px 30px rgba(0,0,0,0.3); 
            --wa-color: #25D366; 
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background-color: var(--dark); color: var(--text-light); padding-bottom: 60px; }

        /* --- HEADER & NAVIGATION --- */
        header {
            background: linear-gradient(135deg, #000000, #1c1c1c);
            padding: 30px 20px;
            text-align: center;
            border-bottom: 3px solid var(--primary);
            box-shadow: var(--shadow);
        }
        header h1 { font-size: 2.2rem; font-weight: 700; color: var(--text-light); letter-spacing: 1px; }
        header h1 span { color: var(--primary); }
        header p { color: var(--text-gray); font-size: 0.95rem; margin-top: 5px; }

        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }

        /* --- CONTROLES: BUSCADOR Y FILTROS --- */
        .controls-wrapper {
            margin-bottom: 30px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .search-bar {
            width: 100%;
            padding: 15px 20px;
            border-radius: 30px;
            border: 1px solid #333;
            background-color: var(--card-bg);
            color: var(--text-light);
            font-size: 1rem;
            outline: none;
            transition: all 0.3s;
        }
        .search-bar:focus { border-color: var(--primary); box-shadow: 0 0 10px rgba(255,140,0,0.2); }

        .categories-container {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            padding-bottom: 5px;
        }
        .categories-container::-webkit-scrollbar { height: 5px; }
        .categories-container::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 10px; }
        
        .cat-btn {
            background-color: var(--card-bg);
            color: var(--text-light);
            padding: 10px 20px;
            border-radius: 20px;
            border: 1px solid #333;
            cursor: pointer;
            white-space: nowrap;
            font-weight: 500;
            transition: all 0.3s;
        }
        .cat-btn.active, .cat-btn:hover {
            background-color: var(--primary);
            border-color: var(--primary);
            color: #000;
            font-weight: 600;
        }

        /* --- REJILLA DE PRODUCTOS --- */
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 25px;
        }
        .product-card {
            background-color: var(--card-bg);
            border-radius: 15px;
            overflow: hidden;
            box-shadow: var(--shadow);
            transition: transform 0.3s, border-color 0.3s;
            border: 1px solid #252525;
            display: flex;
            flex-direction: column;
        }
        .product-card:hover { transform: translateY(-5px); border-color: var(--primary); }
        
        .img-container {
            width: 100%;
            height: 240px;
            background-color: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }
        .product-img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.5s; }
        .product-card:hover .product-img { transform: scale(1.06); }

        .product-info { padding: 20px; display: flex; flex-direction: column; flex-grow: 1; }
        .product-cat { font-size: 0.8rem; color: var(--primary); text-transform: uppercase; font-weight: 600; margin-bottom: 5px; }
        .product-title { font-size: 1.15rem; font-weight: 600; margin-bottom: 10px; line-height: 1.4; min-height: 45px; }
        .product-price { font-size: 1.4rem; font-weight: 700; color: var(--text-light); margin-top: auto; margin-bottom: 15px; }

        .btn-add {
            width: 100%;
            background-color: transparent;
            color: var(--primary);
            border: 2px solid var(--primary);
            padding: 12px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 0.5px;
        }
        .btn-add:hover { background-color: var(--primary); color: #000; }

        /* --- BOTÓN FLOTANTE DEL CARRITO --- */
        .cart-toggle {
            position: fixed;
            bottom: 25px;
            right: 25px;
            background-color: var(--primary);
            color: #000;
            padding: 15px 25px;
            border-radius: 30px;
            font-weight: 700;
            box-shadow: 0 10px 25px rgba(255,140,0,0.4);
            cursor: pointer;
            z-index: 999;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: transform 0.2s;
        }
        .cart-toggle:hover { transform: scale(1.05); background-color: var(--primary-hover); }
        .cart-count { background-color: #000; color: var(--primary); padding: 2px 8px; border-radius: 10px; font-size: 0.85rem; }

        /* --- MODAL DEL CARRITO --- */
        .modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.85);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            backdrop-filter: blur(5px);
        }
        .modal-content {
            background-color: var(--card-bg);
            width: 90%;
            max-width: 500px;
            border-radius: 20px;
            padding: 25px;
            border: 1px solid #333;
            max-height: 85vh;
            display: flex;
            flex-direction: column;
        }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .modal-header h2 { font-size: 1.5rem; color: var(--primary); }
        .close-btn { font-size: 1.8rem; cursor: pointer; color: var(--text-gray); }
        .close-btn:hover { color: var(--text-light); }

        .cart-items { overflow-y: auto; flex-grow: 1; margin-bottom: 20px; padding-right: 5px; }
        .cart-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid #252525;
        }
        .cart-item-info h4 { font-size: 1rem; margin-bottom: 4px; }
        .cart-item-info p { color: var(--text-gray); font-size: 0.9rem; }
        .remove-item { color: #ff4d4d; cursor: pointer; font-size: 0.85rem; font-weight: 500; }
        .remove-item:hover { text-decoration: underline; }

        .cart-summary { margin-top: auto; padding-top: 15px; border-top: 2px solid #333; }
        .total-row { display: flex; justify-content: space-between; font-size: 1.3rem; font-weight: 700; margin-bottom: 15px; }
        
        .btn-checkout {
            width: 100%;
            background-color: var(--wa-color);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            transition: background-color 0.3s;
        }
        .btn-checkout:hover { background-color: #1ebea5; }

        /* --- RESPONSIVE --- */
        @media (max-width: 600px) {
            header h1 { font-size: 1.8rem; }
            .products-grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 15px; }
            .img-container { height: 160px; }
            .product-info { padding: 12px; }
            .product-title { font-size: 0.95rem; min-height: 38px; }
            .product-price { font-size: 1.15rem; }
            .btn-add { padding: 8px; font-size: 0.75rem; }
        }
    </style>
</head>
<body>

    <header>
        <h1>Copa Cars <span>Accesorios</span></h1>
        <p>Catálogo Digital de Accesorios Automotrices</p>
    </header>

    <div class="container">
        <div class="controls-wrapper">
            <input type="text" id="search-input" class="search-bar" placeholder="Buscar productos por nombre...">
            <div id="categories" class="categories-container">
                </div>
        </div>

        <div id="products" class="products-grid">
            </div>
    </div>

    <div class="cart-toggle" onclick="openCart()">
        Ver Pedido <span class="cart-count" id="cart-badge">0</span>
    </div>

    <div id="cart-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Tu Pedido</h2>
                <span class="close-btn" onclick="closeCart()">&times;</span>
            </div>
            <div id="cart-items" class="cart-items">
                </div>
            <div class="cart-summary">
                <div class="total-row">
                    <span>Total:</span>
                    <span id="cart-total">$0.00</span>
                </div>
                <button class="btn-checkout" onclick="checkout()">
                    Confirmar por WhatsApp
                </button>
            </div>
        </div>
    </div>

    <script>
        // CONFIGURACIÓN CENTRAL
        // 1. Reemplaza este link por el enlace de tu nuevo Excel exportado/publicado de Loyverse en formato CSV
        const SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vT64hr_q0btuwx5biukS28oJiCwWWbCdj2i7yXq_s7fSSPMxVDGR1QYEcRwzAkF2mvtpGvypapYm7ip/pub?output=csv'; 
        const PHONE_NUMBER = '593994817472'; // Tu número de WhatsApp con código de país (ej. Ecuador: 593)

        let productsData = [];
        let cart = [];
        let currentCategory = 'Todos';

        // CARGA AUTOMÁTICA DE DATOS
        function init() {
            Papa.parse(SHEET_URL, {
                download: true,
                header: true,
                skipEmptyLines: true,
                complete: function(results) {
                    // Mapeo flexible adaptado a Loyverse
                    productsData = results.data.map((row, index) => {
                        // Limpieza del precio de venta nativo de Loyverse
                        let rawPrice = row['Precio de venta'] || row['Precio'] || row['Price'] || '0';
                        let cleanPrice = parseFloat(rawPrice.replace(/[^0-9,.]/g, '').replace(',', '.'));

                        return {
                            id: index,
                            name: row['Nombre'] || row['Item name'] || 'Producto sin nombre',
                            category: row['Categoría'] || row['Category'] || 'General',
                            price: isNaN(cleanPrice) ? 0 : cleanPrice,
                            // Mapea la columna de tus links de imagen. Asegúrate que en tu excel se llame 'Imagen'
                            image: row['Imagen'] || row['Link Imagen'] || row['Image'] || 'https://via.placeholder.com/300x300?text=No+Image'
                        };
                    });
                    
                    renderCategories();
                    renderProducts();
                }
            });

            // Evento para el buscador
            document.getElementById('search-input').addEventListener('input', renderProducts);
        }

        // GENERAR CATEGORÍAS DINÁMICAMENTE
        function renderCategories() {
            const container = document.getElementById('categories');
            const uniqueCategories = ['Todos', ...new Set(productsData.map(p => p.category).filter(Boolean))];
            
            container.innerHTML = uniqueCategories.map(cat => `
                <button class="cat-btn ${cat === currentCategory ? 'active' : ''}" onclick="filterCategory('${cat}')">
                    ${cat}
                </button>
            `).join('');
        }

        function filterCategory(cat) {
            currentCategory = cat;
            renderCategories();
            renderProducts();
        }

        // RENDERIZAR TARJETAS DE PRODUCTOS
        function renderProducts() {
            const container = document.getElementById('products');
            const searchTerm = document.getElementById('search-input').value.toLowerCase();

            const filtered = productsData.filter(p => {
                const matchesCategory = (currentCategory === 'Todos' || p.category === currentCategory);
                const matchesSearch = p.name.toLowerCase().includes(searchTerm);
                return matchesCategory && matchesSearch;
            });

            if(filtered.length === 0) {
                container.innerHTML = `<div style="grid-column: 1/-1; text-align: center; color: var(--text-gray); padding: 40px;">No se encontraron accesorios.</div>`;
                return;
            }

            container.innerHTML = filtered.map(p => `
                <div class="product-card">
                    <div class="img-container">
                        <img class="product-img" src="${p.image}" alt="${p.name}" loading="lazy" onerror="this.src='https://via.placeholder.com/300x300?text=Copa+Cars'">
                    </div>
                    <div class="product-info">
                        <span class="product-cat">${p.category}</span>
                        <h3 class="product-title">${p.name}</h3>
                        <div class="product-price">$${p.price.toFixed(2)}</div>
                        <button class="btn-add" onclick="addToCart(${p.id})">Agregar</button>
                    </div>
                </div>
            `).join('');
        }

        // LÓGICA DEL CARRITO
        function addToCart(id) {
            const product = productsData.find(p => p.id === id);
            const existing = cart.find(item => item.id === id);

            if(existing) {
                existing.quantity += 1;
            } else {
                cart.push({ ...product, quantity: 1 });
            }
            updateCart();
            
            // Efecto sutil al añadir
            const badge = document.getElementById('cart-badge');
            badge.style.transform = 'scale(1.3)';
            setTimeout(() => badge.style.transform = 'scale(1)', 200);
        }

        function removeFromCart(id) {
            cart = cart.filter(item => item.id !== id);
            updateCart();
        }

        function updateCart() {
            const badge = document.getElementById('cart-badge');
            const itemsContainer = document.getElementById('cart-items');
            const totalContainer = document.getElementById('cart-total');

            const totalCount = cart.reduce((sum, item) => sum + item.quantity, 0);
            badge.innerText = totalCount;

            if(cart.length === 0) {
                itemsContainer.innerHTML = `<p style="text-align: center; color: var(--text-gray); padding: 20px;">Tu carrito está vacío.</p>`;
                totalContainer.innerText = "$0.00";
                return;
            }

            let total = 0;
            itemsContainer.innerHTML = cart.map(item => {
                total += item.price * item.quantity;
                return `
                    <div class="cart-item">
                        <div class="cart-item-info">
                            <h4>${item.name}</h4>
                            <p>${item.quantity}x - $${item.price.toFixed(2)}</p>
                        </div>
                        <div style="text-align: right;">
                            <div style="font-weight: 600; margin-bottom: 5px;">$${(item.price * item.quantity).toFixed(2)}</div>
                            <span class="remove-item" onclick="removeFromCart(${item.id})">Eliminar</span>
                        </div>
                    </div>
                `;
            }).join('');

            totalContainer.innerText = `$${total.toFixed(2)}`;
        }

        function openCart() { document.getElementById('cart-modal').style.display = 'flex'; }
        function closeCart() { document.getElementById('cart-modal').style.display = 'none'; }

        // ENVÍO DE PEDIDO A WHATSAPP
        function checkout() {
            if(cart.length === 0) return;
            
            let msg = "Hola Copa Cars, deseo realizar el siguiente pedido:%0A%0A";
            let total = 0;
            
            cart.forEach(item => {
                total += item.price * item.quantity;
                msg += `▪️ *${item.quantity}x ${item.name}* - $${(item.price * item.quantity).toFixed(2)}%0A`;
            });
            
            msg += `%0A*TOTAL A PAGAR: $${total.toFixed(2)}*`;
            msg += "%0A%0APor favor, indíqueme la disponibilidad y los datos para el pago. ¡Gracias!";
            
            window.open(`https://wa.me/${PHONE_NUMBER}?text=${msg}`, '_blank');
        }

        // Inicializar la app al cargar la página
        window.onload = init;
    </script>
</body>
</html>
